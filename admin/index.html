<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Lindsey's Doggy Daycare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; }

    /* Branded loading screen — shown until Decap CMS takes over */
    #cms-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      background: linear-gradient(135deg, #1e5c35 0%, #2d8653 100%);
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .loading-paw {
      font-size: 3.5rem;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .loading-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }
    .loading-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes bounce  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  </style>

  <!-- Netlify Identity Widget — required for CMS login -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <!-- Branded loading screen — visible briefly while Decap CMS loads -->
  <div id="cms-loading">
    <div class="loading-paw">🐾</div>
    <div class="loading-title">Lindsey's Admin Panel</div>
    <div class="loading-sub">Loading your content manager…</div>
    <div class="spinner"></div>
  </div>

  <!-- Decap CMS (formerly Netlify CMS) -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Hide the loading screen once Decap CMS has fully loaded
    window.addEventListener('load', () => {
      const loader = document.getElementById('cms-loading');
      if (loader) {
        loader.style.transition = 'opacity 0.4s ease';
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 400);
      }
    });

    // Custom Live Gallery Preview for Lindsey
    const GalleryPreview = createClass({
      render: function() {
        const entry = this.props.entry;
        const photos = entry.getIn(['data', 'photos']);
        const photosList = photos ? photos.toJS() : [];

        const elements = photosList.map((photo, index) => {
          const resolved = photo.src ? this.props.getAsset(photo.src) : null;
          let src = resolved ? resolved.toString() : '';
          if (src && !src.startsWith('http') && !src.startsWith('blob:') && !src.startsWith('/')) {
            src = '/' + src;
          }
          return h('div', { 
            key: index,
            style: {
              display: 'inline-block',
              width: '120px',
              margin: '8px',
              padding: '8px',
              border: '1px solid #e5e9e6',
              borderRadius: '8px',
              textAlign: 'center',
              backgroundColor: '#fff',
              boxShadow: '0 2px 8px rgba(45,134,83,0.08)'
            }
          },
            h('img', { 
              src: src, 
              style: { width: '100%', height: '90px', objectFit: 'cover', borderRadius: '6px' } 
            }),
            h('div', { 
              style: { 
                fontSize: '11px', 
                fontWeight: '500',
                color: '#2d8653', 
                marginTop: '6px', 
                overflow: 'hidden', 
                textOverflow: 'ellipsis', 
                whiteSpace: 'nowrap' 
              } 
            }, photo.caption || '🐾')
          );
        });

        return h('div', { 
          style: { padding: '24px', backgroundColor: '#f0faf4', minHeight: '100vh', fontFamily: "sans-serif" } 
        },
          h('h1', { style: { color: '#1e5c35', fontSize: '22px', fontWeight: '700', marginBottom: '8px' } }, '🐾 Gallery Live Preview'),
          h('p', { style: { color: '#6b8872', fontSize: '13px', marginBottom: '20px' } }, 'This shows how your photos look on the website. Drag to reorder them on the left:'),
          h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px' } }, elements)
        );
      }
    });

    CMS.registerPreviewTemplate('gallery', GalleryPreview);
  </script>
</body>
</html>
